<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실생활 함수 그래프 탐구 퍼즐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>함수로 그리는 세상</h1>
            <p>슬라이더를 움직여 실생활의 궤적과 그래프를 맞춰보세요!</p>
        </header>

        <main>
            <div class="controls-panel">
                <section class="scenario-selector">
                    <h3>1. 탐구 상황 선택</h3>
                    <button class="scenario-btn active" data-scenario="linear">비행기 이륙 (일차함수)</button>
                    <button class="scenario-btn" data-scenario="basketball">농구공 슛 (이차함수)</button>
                    <button class="scenario-btn" data-scenario="bridge">금문교 케이블 (이차함수)</button>
                    <button class="scenario-btn" data-scenario="fountain">분수대 물줄기 (이차함수)</button>
                </section>

                <section class="equation-controls">
                    <h3>2. 변수 조작하기</h3>
                    <div id="equation-display">y = ax + b</div>
                    
                    <div class="slider-group">
                        <label for="val-a">a (기울기/폭): <span id="label-a">1</span></label>
                        <input type="range" id="val-a" min="-5" max="5" step="0.1" value="1">
                    </div>
                    
                    <div class="slider-group" id="group-b">
                        <label for="val-b">b (x계수/y절편): <span id="label-b">0</span></label>
                        <input type="range" id="val-b" min="-10" max="10" step="0.5" value="0">
                    </div>

                    <div class="slider-group" id="group-c" style="display: none;">
                        <label for="val-c">c (y절편): <span id="label-c">0</span></label>
                        <input type="range" id="val-c" min="-10" max="10" step="0.5" value="0">
                    </div>
                </section>

                <section class="inquiry-section">
                    <h3>💡 탐구 및 토론</h3>
                    <p id="inquiry-question">a의 값이 커지면 비행기의 이륙 경로는 어떻게 변하나요?</p>
                </section>
            </div>

            <div class="canvas-panel">
                <canvas id="graphCanvas" width="600" height="600"></canvas>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
